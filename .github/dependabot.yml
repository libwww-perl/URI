---
version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    # Check for updates to GitHub Actions every week
    interval: "weekly"
  groups:
    minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
  cooldown:
    default-days: 7
